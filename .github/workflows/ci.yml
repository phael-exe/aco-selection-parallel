name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sequential:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # T01 (#24): valida so o que esta no escopo do Makefile + stub —
      # compila, build/ e criado, make clean funciona. Rodar o binario com
      # <dataset> --seed <int> --output <path> (e comparar saidas) e contrato
      # do T03/equivalencia: restaurar Run + Upload quando o CLI existir.
      - name: Build sequential
        run: make sequential

      - name: Verificar build/ e make clean
        run: |
          test -x build/aco_seq
          make clean
          test ! -d build

  build-openmp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Compile-only enquanto src/openmp/ esta vazio (epico OpenMP nao iniciado):
      # 'make openmp' pula graciosamente sem gerar binario. Restaurar os passos
      # de Run + Upload (e reativar o job 'equivalence') quando houver fontes
      # em src/openmp/*.cpp. Contrato: <dataset> --seed <int> --output <path>.
      - name: Build OpenMP
        run: make openmp

  build-cuda:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # nvcc NAO e instalado enquanto src/cuda/ esta vazio (epico CUDA nao iniciado):
      # 'make cuda' pula graciosamente. Restaurar o passo 'Install nvcc'
      # (Jimver/cuda-toolkit com uma versao valida, ex: '12.5.0') quando houver
      # fontes em src/cuda/*.cu para de fato compilar.
      - name: Build CUDA (skip enquanto vazio)
        run: make cuda CI=1

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install flake8
        run: pip install flake8==7.1.1

      - name: Lint scripts/
        run: flake8 scripts/ --max-line-length=120 --select=E9,F

      - name: Install test dependencies
        run: pip install pytest numpy==2.0.2

      - name: Run Python tests
        run: pytest scripts/tests/ -v

  # Desativado enquanto OpenMP nao gera saidas: nao ha o que comparar com o
  # sequencial. Trocar para 'if: ${{ true }}' quando build-openmp voltar a
  # produzir artefatos omp-outputs (ver comentario no job build-openmp).
  equivalence:
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-sequential, build-openmp]
    steps:
      - uses: actions/checkout@v4

      - name: Download sequential outputs
        uses: actions/download-artifact@v4
        with:
          name: seq-outputs
          path: results/ci

      - name: Download OpenMP outputs
        uses: actions/download-artifact@v4
        with:
          name: omp-outputs
          path: results/ci

      - name: Install numpy
        run: pip install numpy==2.0.2

      - name: Compare haberman outputs
        run: python3 scripts/compare_outputs.py results/ci/seq_haberman.csv results/ci/omp_haberman.csv

      - name: Compare heart_failure outputs
        run: python3 scripts/compare_outputs.py results/ci/seq_heart.csv results/ci/omp_heart.csv
